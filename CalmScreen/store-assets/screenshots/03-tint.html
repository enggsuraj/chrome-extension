<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CalmScreen — Before / after</title>
    <link rel="stylesheet" href="frame.css" />
    <style>
      /* Override the default browser frame for the split-screen demo */
      .browser {
        right: auto;
        left: 50%;
        top: 200px;
        width: 760px;
        height: 540px;
        transform: translateX(-50%) rotate(0deg);
        z-index: 2;
      }
      .copy {
        top: 50px;
        width: 100%;
        text-align: center;
        left: 0;
        padding: 0 64px;
        box-sizing: border-box;
      }
      .copy h1.big {
        font-size: 42px;
        margin-bottom: 8px;
        line-height: 1.05;
      }
      .copy p.lead {
        max-width: 700px;
        margin: 0 auto;
        font-size: 16px;
      }
      .copy .eyebrow { display: none; }

      /* Two iframes in a split */
      .split {
        position: absolute; inset: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .pane {
        position: relative;
        overflow: hidden;
      }
      .pane iframe {
        width: 100%; height: 100%; border: 0; display: block;
      }
      /* The "after" pane gets the actual filter we apply in the extension. */
      .pane.after iframe {
        filter: brightness(0.93) sepia(0.32) hue-rotate(-12deg) saturate(1.09);
      }
      .divider {
        position: absolute;
        top: 0; bottom: 0; left: 50%;
        width: 0; border-left: 2px dashed rgba(20,30,60,0.18);
        pointer-events: none;
        z-index: 5;
      }
      .pane-tag {
        position: absolute;
        top: 12px; left: 50%;
        transform: translateX(-50%);
        background: white;
        color: #1a1a24;
        font-size: 10.5px; font-weight: 700;
        letter-spacing: 0.12em; text-transform: uppercase;
        padding: 5px 12px;
        border-radius: 999px;
        border: 1px solid rgba(20,30,60,0.08);
        box-shadow: 0 4px 10px rgba(20,30,60,0.10);
        z-index: 6;
      }
      .pane.after .pane-tag {
        background: linear-gradient(135deg, #5b8def, #a78bfa, #e89b5a);
        color: white;
        border-color: transparent;
        box-shadow: 0 4px 12px rgba(232,155,90,0.40);
      }

      /* Toolbar — show our extension as active */
      .toolbar { padding: 10px 14px; }
      .urlbar { font-size: 11px; }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="copy">
        <h1 class="big">Take the blue out of <span class="grad">long sessions.</span></h1>
        <p class="lead">A soft amber tint and a gentle dim — applied directly on the page, transitioning smoothly. Same content. Easier on your eyes.</p>
      </div>

      <div class="browser">
        <div class="toolbar">
          <div class="traffic"><span></span><span></span><span></span></div>
          <div class="urlbar">wellness.example.com/eye-care</div>
          <div class="ext-icons">
            <div class="ext-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"></circle></svg></div>
            <div class="ext-icon active">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <path d="M4 12 Q12 17, 20 12"/>
                <line x1="6.8" y1="14.6" x2="6.1" y2="16.2"/>
                <line x1="9.4" y1="15.8" x2="9.0" y2="17.6"/>
                <line x1="12.0" y1="16.1" x2="12.0" y2="18.0"/>
                <line x1="14.6" y1="15.8" x2="15.0" y2="17.6"/>
                <line x1="17.2" y1="14.6" x2="17.9" y2="16.2"/>
              </svg>
            </div>
          </div>
        </div>
        <div class="page-area">
          <div class="split">
            <div class="pane before">
              <span class="pane-tag">Off</span>
              <iframe src="preview-page.html" frameborder="0" scrolling="no"></iframe>
            </div>
            <div class="pane after">
              <span class="pane-tag">CalmScreen · Evening</span>
              <iframe src="preview-page.html" frameborder="0" scrolling="no"></iframe>
            </div>
          </div>
          <div class="divider"></div>
        </div>
      </div>

      <div class="wm">
        <div class="logo-sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M4 12 Q12 17, 20 12"/>
            <line x1="6.8" y1="14.6" x2="6.1" y2="16.2"/>
            <line x1="9.4" y1="15.8" x2="9.0" y2="17.6"/>
            <line x1="12.0" y1="16.1" x2="12.0" y2="18.0"/>
            <line x1="14.6" y1="15.8" x2="15.0" y2="17.6"/>
            <line x1="17.2" y1="14.6" x2="17.9" y2="16.2"/>
          </svg>
        </div>
        <span><span class="wm-name">CalmScreen</span> <span class="wm-sep">·</span> for Chrome</span>
      </div>
    </div>
  </body>
</html>
