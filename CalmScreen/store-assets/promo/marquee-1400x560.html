<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CalmScreen — Marquee promo (1400×560)</title>
    <link rel="stylesheet" href="../screenshots/popup-mock.css" />
    <style>
      html, body {
        margin: 0; padding: 0;
        width: 1400px; height: 560px;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #1a1a24;
      }
      .stage {
        width: 1400px; height: 560px;
        position: fixed; top: 0; left: 0;
        overflow: hidden;
        background:
          radial-gradient(900px 600px at 100% -10%, rgba(232, 155, 90, 0.32), transparent 60%),
          radial-gradient(900px 600px at 0% 110%, rgba(91, 141, 239, 0.30), transparent 60%),
          linear-gradient(180deg, #f6f7fb 0%, #e6e9f3 100%);
      }
      .stage::after {
        content: "";
        position: absolute; inset: 0;
        background-image:
          linear-gradient(to right, rgba(20,30,60,0.025) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(20,30,60,0.025) 1px, transparent 1px);
        background-size: 56px 56px;
        mask-image: radial-gradient(900px 600px at 50% 50%, #000 30%, transparent 80%);
        -webkit-mask-image: radial-gradient(900px 600px at 50% 50%, #000 30%, transparent 80%);
        pointer-events: none;
      }

      .copy {
        position: absolute;
        left: 80px; top: 80px;
        width: 700px;
        z-index: 3;
      }
      .brand-row {
        display: flex; align-items: center; gap: 14px;
        margin-bottom: 28px;
      }
      .logo {
        width: 56px; height: 56px;
        border-radius: 14px;
        background: linear-gradient(135deg, #5b8def 0%, #a78bfa 50%, #e89b5a 100%);
        display: grid; place-items: center;
        color: white;
        box-shadow:
          0 16px 30px rgba(91,141,239,0.32),
          inset 0 0 0 0.5px rgba(255,255,255,0.25);
      }
      .logo svg { width: 30px; height: 30px; }
      .brand-name { font-size: 20px; font-weight: 700; letter-spacing: -0.015em; }
      .brand-tag { font-size: 12.5px; color: #7a7a86; margin-top: 2px; letter-spacing: 0.005em; }

      h1.hero {
        font-family: "Iowan Old Style", "Charter", "Georgia", serif;
        font-size: 72px;
        line-height: 0.98;
        letter-spacing: -0.028em;
        font-weight: 600;
        color: #1a1a24;
        margin: 0 0 18px;
      }
      h1.hero .grad {
        background: linear-gradient(135deg, #5b8def 0%, #a78bfa 50%, #e89b5a 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      p.lead {
        font-size: 17px;
        line-height: 1.45;
        color: #4a4a58;
        margin: 0 0 22px;
        max-width: 580px;
        letter-spacing: -0.005em;
      }
      .chips-row {
        display: flex; gap: 8px;
      }
      .chip {
        display: inline-flex; align-items: center; gap: 7px;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(20,30,60,0.06);
        font-size: 12.5px; font-weight: 700;
        color: #1a1a24;
        box-shadow: 0 6px 14px rgba(20,30,60,0.06);
      }
      .chip .dot {
        width: 9px; height: 9px; border-radius: 50%;
        background: linear-gradient(135deg, #5b8def, #a78bfa, #e89b5a);
      }

      .right {
        position: absolute;
        right: 0; top: 0;
        width: 640px; height: 560px;
        z-index: 2;
      }
      .popup-glow {
        position: absolute;
        right: 60px; top: 60px;
        width: 540px; height: 540px;
        border-radius: 50%;
        background:
          radial-gradient(closest-side, rgba(232,155,90,0.30) 0%, rgba(91,141,239,0.18) 50%, transparent 70%);
        filter: blur(18px);
        z-index: 1;
      }
      .popup-stage {
        position: absolute;
        right: 110px; top: 60px;
        transform: rotate(-2deg) scale(1.25);
        transform-origin: top right;
        z-index: 3;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="copy">
        <div class="brand-row">
          <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <path d="M4 12 Q12 17, 20 12"/>
              <line x1="6.8" y1="14.6" x2="6.1" y2="16.2"/>
              <line x1="9.4" y1="15.8" x2="9.0" y2="17.6"/>
              <line x1="12.0" y1="16.1" x2="12.0" y2="18.0"/>
              <line x1="14.6" y1="15.8" x2="15.0" y2="17.6"/>
              <line x1="17.2" y1="14.6" x2="17.9" y2="16.2"/>
            </svg>
          </div>
          <div>
            <div class="brand-name">CalmScreen</div>
            <div class="brand-tag">Eye comfort for Chrome · v1.0</div>
          </div>
        </div>

        <h1 class="hero">Easy on the<br/><span class="grad">eyes.</span> All day.</h1>
        <p class="lead">Two sliders. Three presets. Nothing else. Quietly takes the harsh blue out of every site.</p>

        <div class="chips-row">
          <div class="chip"><span class="dot"></span> Brightness · Warmth</div>
          <div class="chip"><span class="dot"></span> Per-site off</div>
          <div class="chip"><span class="dot"></span> 100% local</div>
        </div>
      </div>

      <div class="right">
        <div class="popup-glow"></div>
        <div class="popup-stage">
          <div class="pm">
            <div class="pm-app">
              <div class="pm-hd">
                <div class="pm-brand">
                  <div class="pm-mark">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                      <path d="M4 12 Q12 17, 20 12"/>
                      <line x1="6.8" y1="14.6" x2="6.1" y2="16.2"/>
                      <line x1="9.4" y1="15.8" x2="9.0" y2="17.6"/>
                      <line x1="12.0" y1="16.1" x2="12.0" y2="18.0"/>
                      <line x1="14.6" y1="15.8" x2="15.0" y2="17.6"/>
                      <line x1="17.2" y1="14.6" x2="17.9" y2="16.2"/>
                    </svg>
                  </div>
                  <div class="pm-brand-text">
                    <span class="pm-brand-name">CalmScreen</span>
                    <span class="pm-origin">medium.com</span>
                  </div>
                </div>
                <div class="pm-toggle"></div>
              </div>

              <div class="pm-presets">
                <div class="pm-preset"><span class="pe">☀️</span><span class="pn">Day</span></div>
                <div class="pm-preset on"><span class="pe">🌅</span><span class="pn">Evening</span></div>
                <div class="pm-preset"><span class="pe">🌙</span><span class="pn">Night</span></div>
              </div>

              <div class="pm-sliders">
                <div class="pm-sl">
                  <div class="pm-sl-head">
                    <span class="pm-sl-name">Brightness</span>
                    <span class="pm-sl-val">92%</span>
                  </div>
                  <div class="pm-sl-row">
                    <span class="pm-sl-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="2.6"/></svg></span>
                    <div class="pm-track brightness"><span class="pm-thumb" style="left: 92%;"></span></div>
                    <span class="pm-sl-icon" style="color:#3a3a44">
                      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                        <circle cx="8" cy="8" r="3" fill="currentColor"/>
                        <line x1="8" y1="1.5" x2="8" y2="3.2"/><line x1="8" y1="12.8" x2="8" y2="14.5"/>
                        <line x1="1.5" y1="8" x2="3.2" y2="8"/><line x1="12.8" y1="8" x2="14.5" y2="8"/>
                        <line x1="3.4" y1="3.4" x2="4.5" y2="4.5"/><line x1="11.5" y1="11.5" x2="12.6" y2="12.6"/>
                        <line x1="3.4" y1="12.6" x2="4.5" y2="11.5"/><line x1="11.5" y1="4.5" x2="12.6" y2="3.4"/>
                      </svg>
                    </span>
                  </div>
                </div>

                <div class="pm-sl">
                  <div class="pm-sl-head">
                    <span class="pm-sl-name">Warmth</span>
                    <span class="pm-sl-val">45%</span>
                  </div>
                  <div class="pm-sl-row">
                    <span class="pm-sl-icon cool">
                      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                        <line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/>
                        <line x1="3.5" y1="3.5" x2="12.5" y2="12.5"/><line x1="3.5" y1="12.5" x2="12.5" y2="3.5"/>
                      </svg>
                    </span>
                    <div class="pm-track warmth"><span class="pm-thumb" style="left: 45%;"></span></div>
                    <span class="pm-sl-icon warm">
                      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 2 C 6 5, 4 7, 4 10 a 4 4 0 0 0 8 0 c 0 -3 -2 -5 -4 -8 z" fill="currentColor"/>
                      </svg>
                    </span>
                  </div>
                </div>
              </div>

              <div class="pm-ft">
                <kbd>⌥</kbd><kbd>⇧</kbd><kbd>C</kbd>
                <span>toggle this site</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
