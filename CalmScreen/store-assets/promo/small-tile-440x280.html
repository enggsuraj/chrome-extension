<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CalmScreen — Small promo tile (440×280)</title>
    <style>
      html, body {
        margin: 0; padding: 0;
        width: 440px; height: 280px;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #1a1a24;
      }
      .tile {
        width: 440px; height: 280px;
        position: fixed; top: 0; left: 0;
        background:
          radial-gradient(380px 280px at 110% -10%, rgba(232, 155, 90, 0.42), transparent 60%),
          radial-gradient(380px 280px at -10% 110%, rgba(91, 141, 239, 0.42), transparent 60%),
          linear-gradient(180deg, #f4f5fa 0%, #e6e9f3 100%);
        overflow: hidden;
        padding: 28px;
        box-sizing: border-box;
      }
      .tile::after {
        content: "";
        position: absolute; inset: 0;
        background-image:
          linear-gradient(to right, rgba(20,30,60,0.025) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(20,30,60,0.025) 1px, transparent 1px);
        background-size: 32px 32px;
        mask-image: radial-gradient(380px 280px at 30% 50%, #000 30%, transparent 80%);
        -webkit-mask-image: radial-gradient(380px 280px at 30% 50%, #000 30%, transparent 80%);
        pointer-events: none;
      }
      .brand-row {
        display: flex; align-items: center; gap: 12px;
        margin-bottom: 22px;
        position: relative;
        z-index: 2;
      }
      .logo {
        width: 44px; height: 44px;
        border-radius: 11px;
        background: linear-gradient(135deg, #5b8def 0%, #a78bfa 50%, #e89b5a 100%);
        display: grid; place-items: center;
        color: white;
        box-shadow:
          0 10px 22px rgba(91,141,239,0.32),
          inset 0 0 0 0.5px rgba(255,255,255,0.25);
      }
      .logo svg { width: 24px; height: 24px; }
      .brand-name {
        font-size: 17px; font-weight: 700; letter-spacing: -0.01em;
      }
      .brand-tag {
        font-size: 11px; color: #7a7a86; margin-top: 1px;
      }
      h1 {
        font-family: "Iowan Old Style", "Charter", "Georgia", serif;
        font-size: 32px;
        line-height: 1.02;
        letter-spacing: -0.022em;
        font-weight: 600;
        margin: 0 0 12px;
        max-width: 360px;
        position: relative;
        z-index: 2;
      }
      h1 .grad {
        background: linear-gradient(135deg, #5b8def 0%, #a78bfa 50%, #e89b5a 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      p.lead {
        font-size: 12.5px; line-height: 1.45;
        color: #4a4a58;
        margin: 0;
        max-width: 320px;
        letter-spacing: -0.005em;
        position: relative;
        z-index: 2;
      }
      .pill {
        position: absolute;
        right: 22px; bottom: 22px;
        display: inline-flex; align-items: center; gap: 7px;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(20,30,60,0.06);
        font-size: 11.5px; font-weight: 700;
        color: #1a1a24;
        box-shadow: 0 8px 18px rgba(20,30,60,0.10);
        z-index: 3;
      }
      .pill .dot {
        width: 9px; height: 9px; border-radius: 50%;
        background: linear-gradient(135deg, #5b8def, #a78bfa, #e89b5a);
      }
    </style>
  </head>
  <body>
    <div class="tile">
      <div class="brand-row">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M4 12 Q12 17, 20 12"/>
            <line x1="6.8" y1="14.6" x2="6.1" y2="16.2"/>
            <line x1="9.4" y1="15.8" x2="9.0" y2="17.6"/>
            <line x1="12.0" y1="16.1" x2="12.0" y2="18.0"/>
            <line x1="14.6" y1="15.8" x2="15.0" y2="17.6"/>
            <line x1="17.2" y1="14.6" x2="17.9" y2="16.2"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">CalmScreen</div>
          <div class="brand-tag">Eye comfort for Chrome</div>
        </div>
      </div>

      <h1>Easy on the <span class="grad">eyes.</span><br/>All day.</h1>
      <p class="lead">Two sliders. Three presets. Done.</p>

      <div class="pill">
        <span class="dot"></span>
        <span>100% local</span>
      </div>
    </div>
  </body>
</html>
