<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b8def"/>
      <stop offset="55%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#e89b5a"/>
    </linearGradient>
  </defs>

  <!-- Rounded square: cool blue → soft purple → warm amber -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Closed eye lid: a calm, downward curve -->
  <path d="M22 64 Q64 92, 106 64"
        fill="none" stroke="white" stroke-width="6"
        stroke-linecap="round"/>

  <!-- Five short lashes hanging down from the lid -->
  <g stroke="white" stroke-width="4" stroke-linecap="round">
    <line x1="36" y1="78" x2="32" y2="86"/>
    <line x1="50" y1="84" x2="48" y2="94"/>
    <line x1="64" y1="86" x2="64" y2="96"/>
    <line x1="78" y1="84" x2="80" y2="94"/>
    <line x1="92" y1="78" x2="96" y2="86"/>
  </g>
</svg>
