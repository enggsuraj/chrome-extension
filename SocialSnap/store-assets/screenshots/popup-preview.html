<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SocialSnap preview</title>
  <link rel="stylesheet" href="../../popup.css" />
  <style>
    /* Force a specific theme regardless of system pref (for consistent screenshots). */
    html.force-dark {
      color-scheme: dark;
    }
    html.force-dark body, html.force-dark {
      --bg: #0a0a0b;
      --surface: #121214;
      --surface-2: #17171a;
      --surface-3: #1e1e22;
      --border: rgba(255, 255, 255, 0.07);
      --border-strong: rgba(255, 255, 255, 0.12);
      --text: #fafafa;
      --text-dim: #b4b4b8;
      --text-muted: #82828a;
      --text-faint: #5a5a62;
      --accent: #fafafa;
      --accent-grad: linear-gradient(135deg, #a78bfa 0%, #38bdf8 100%);
      --success: #22c55e;
      --danger: #f87171;
      --ring: rgba(255, 255, 255, 0.12);
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.35);
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.4), 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.45), 0 2px 4px rgba(0, 0, 0, 0.3);
      --ambient-1: rgba(124, 92, 255, 0.12);
      --ambient-2: rgba(14, 165, 233, 0.08);
      --scroll-thumb: rgba(255, 255, 255, 0.12);
      --scroll-thumb-hover: rgba(255, 255, 255, 0.22);
      --toast-bg: #fafafa;
      --toast-text: #0a0a0a;
      --footer-glass: rgba(10, 10, 11, 0.6);
    }
    html.force-light {
      color-scheme: light;
    }
    html.force-light, html.force-light body {
      --bg: #fafaf9;
      --surface: #ffffff;
      --surface-2: #f5f5f4;
      --surface-3: #eeeeed;
      --border: #ececec;
      --border-strong: #e0e0e0;
      --text: #0a0a0a;
      --text-dim: #52525b;
      --text-muted: #8a8a8f;
      --text-faint: #b4b4b8;
      --accent: #111111;
      --accent-grad: linear-gradient(135deg, #7c5cff 0%, #0ea5e9 100%);
      --success: #16a34a;
      --danger: #ef4444;
      --ring: rgba(17, 17, 17, 0.12);
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.06), 0 2px 4px rgba(0, 0, 0, 0.04);
      --ambient-1: rgba(124, 92, 255, 0.06);
      --ambient-2: rgba(14, 165, 233, 0.05);
      --scroll-thumb: rgba(0, 0, 0, 0.12);
      --scroll-thumb-hover: rgba(0, 0, 0, 0.22);
      --toast-bg: #0a0a0a;
      --toast-text: #fafafa;
      --footer-glass: rgba(255, 255, 255, 0.6);
    }
    /* Hide the loading placeholder instantly — we render statically. */
    .loading { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
          </svg>
        </div>
        <div class="title-block">
          <h1>SocialSnap</h1>
          <p class="subtitle" id="pageHost">acmestudio.co</p>
        </div>
      </div>
      <button class="icon-btn" title="Rescan page" aria-label="Rescan page">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
      </button>
    </header>

    <section class="stats" id="stats">
      <button class="stat" data-filter="all">
        <span class="stat-count">11</span>
        <span class="stat-label">All</span>
      </button>
      <button class="stat" data-filter="social">
        <span class="stat-count">7</span>
        <span class="stat-label">Social</span>
      </button>
      <button class="stat" data-filter="email">
        <span class="stat-count">3</span>
        <span class="stat-label">Emails</span>
      </button>
      <button class="stat" data-filter="phone">
        <span class="stat-count">1</span>
        <span class="stat-label">Phones</span>
      </button>
    </section>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input id="searchInput" type="text" placeholder="Filter results…" />
    </div>

    <main id="results" class="results"></main>

    <footer class="app-footer">
      <button class="ghost-btn">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
        Copy visible
      </button>
      <button class="ghost-btn">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Export JSON
      </button>
    </footer>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </div>

<script>
(function () {
  const params = new URLSearchParams(location.search);
  const theme = params.get("theme") || "light"; // light | dark
  const tab = params.get("tab") || "all"; // all | social | email | phone
  const q = (params.get("q") || "").toLowerCase();
  const showToast = params.get("toast") === "1";
  const host = params.get("host");

  document.documentElement.classList.add(theme === "dark" ? "force-dark" : "force-light");
  if (host) document.getElementById("pageHost").textContent = host;

  // Sample dataset — realistic, brand-safe
  const SAMPLE = [
    // social
    { type: "social", platform: "youtube", platformLabel: "YouTube", letter: "Y",
      label: "@veritasium", url: "https://youtube.com/@veritasium" },
    { type: "social", platform: "instagram", platformLabel: "Instagram", letter: "I",
      label: "@acmestudio", url: "https://instagram.com/acmestudio" },
    { type: "social", platform: "twitter", platformLabel: "X", letter: "X",
      label: "@paulg", url: "https://x.com/paulg" },
    { type: "social", platform: "linkedin", platformLabel: "LinkedIn", letter: "L",
      label: "in/satyanadella", url: "https://linkedin.com/in/satyanadella" },
    { type: "social", platform: "github", platformLabel: "GitHub", letter: "G",
      label: "@enggsuraj", url: "https://github.com/enggsuraj" },
    { type: "social", platform: "tiktok", platformLabel: "TikTok", letter: "T",
      label: "@khaby.lame", url: "https://tiktok.com/@khaby.lame" },
    { type: "social", platform: "reddit", platformLabel: "Reddit", letter: "R",
      label: "r/webdev", url: "https://reddit.com/r/webdev" },
    // emails
    { type: "email", value: "press@acmestudio.co" },
    { type: "email", value: "hello@acmestudio.co" },
    { type: "email", value: "careers@acmestudio.co" },
    // phones
    { type: "phone", value: "+1 (415) 555-0132" },
  ];

  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    }[c]));
  }

  // Activate the right stat
  document.querySelectorAll(".stat").forEach((el) => {
    el.classList.toggle("active", el.dataset.filter === tab);
  });

  // Pre-fill search
  const input = document.getElementById("searchInput");
  if (q) input.value = q;

  // Filter
  let items = SAMPLE.slice();
  if (tab !== "all") items = items.filter((x) => x.type === tab);
  if (q) {
    items = items.filter((x) => {
      const hay = (x.label || "") + " " + (x.value || "") + " " + (x.url || "") + " " + (x.platformLabel || "");
      return hay.toLowerCase().includes(q);
    });
  }

  // Group
  const groups = { social: [], email: [], phone: [] };
  items.forEach((it) => groups[it.type].push(it));
  const order = ["social", "email", "phone"];
  const titles = { social: "Social Profiles", email: "Emails", phone: "Phone Numbers" };

  const results = document.getElementById("results");
  for (const key of order) {
    const list = groups[key];
    if (!list.length) continue;
    const group = document.createElement("section");
    group.className = "group";

    const header = document.createElement("div");
    header.className = "group-header";
    header.innerHTML = `<div class="group-title">${titles[key]}</div><div class="group-badge">${list.length}</div>`;
    group.appendChild(header);

    const gl = document.createElement("div");
    gl.className = "group-list";
    for (const it of list) {
      const row = document.createElement("div");
      row.className = "item";

      const icon = document.createElement("div");
      icon.className = "item-icon";
      let label = "", valueHtml = "";
      if (it.type === "social") {
        icon.classList.add(`icon-${it.platform}`);
        icon.textContent = it.letter || "·";
        label = it.platformLabel;
        valueHtml = `<a href="${escapeHtml(it.url)}">${escapeHtml(it.label || it.url)}</a>`;
      } else if (it.type === "email") {
        icon.classList.add("icon-email");
        icon.textContent = "@";
        label = "Email";
        valueHtml = `<a href="mailto:${escapeHtml(it.value)}">${escapeHtml(it.value)}</a>`;
      } else if (it.type === "phone") {
        icon.classList.add("icon-phone");
        icon.textContent = "☎";
        label = "Phone";
        valueHtml = `<a href="#">${escapeHtml(it.value)}</a>`;
      }

      const content = document.createElement("div");
      content.className = "item-content";
      content.innerHTML = `<span class="item-label">${escapeHtml(label)}</span><span class="item-value">${valueHtml}</span>`;

      const actions = document.createElement("div");
      actions.className = "item-actions";
      actions.innerHTML = `
        <button class="action-btn" title="Copy"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
        <button class="action-btn" title="Open"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg></button>`;

      row.append(icon, content, actions);
      gl.appendChild(row);
    }
    group.appendChild(gl);
    results.appendChild(group);
  }

  if (showToast) {
    const t = document.getElementById("toast");
    t.textContent = "Copied to clipboard";
    t.classList.add("show");
  }

  // Enable footer buttons (visually)
  document.querySelectorAll(".app-footer .ghost-btn").forEach((b) => (b.disabled = false));
})();
</script>
</body>
</html>
